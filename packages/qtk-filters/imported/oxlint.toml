# RTK description: "Compact oxlint output — strip blank lines, keep diagnostics"

command = "oxlint"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Finished in \\d+",
  "^Found \\d+ warning",
]
truncate = 50
on_empty = "oxlint: ok"
