# RTK description: "Compact stat output — strip device/inode/birth noise"

command = "stat"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^\\s*Device:",
  "^\\s*Birth:",
]
# RTK: truncate_lines_at = 120  (not yet supported by QTK — review)
truncate = 20
