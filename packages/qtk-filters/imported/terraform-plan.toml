# RTK description: "Compact Terraform plan output"

command = "terraform\\s+plan"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^Refreshing state",
  "^\\s*#.*unchanged",
  "^\\s*$",
  "^Acquiring state lock",
  "^Releasing state lock",
]
truncate = 80
on_empty = "terraform plan: no changes detected"
