# RTK description: "Compact Biome lint/format output — strip blank lines, keep diagnostics"

command = "biome"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Checked \\d+ file",
  "^Fixed \\d+ file",
  "^The following command",
  "^Run it with",
]
truncate = 50
on_empty = "biome: ok"
