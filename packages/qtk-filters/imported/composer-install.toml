# RTK description: "Compact composer install/update/require output — strip downloads, short-circuit when up-to-date"

command = "composer\\s+(install|update|require)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^  - Downloading ",
  "^  - Installing ",
  "^Loading composer",
  "^Updating dependencies",
]
# RTK: match_output = [...]  (multi-line; not yet supported by QTK — review)
truncate = 30
