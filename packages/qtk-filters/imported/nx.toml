# RTK description: "Compact Nx monorepo output — strip task graph noise, keep results"

command = "(pnpm\\s+)?nx"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^\\s*>\\s*NX\\s+Running target",
  "^\\s*>\\s*NX\\s+Nx read the output",
  "^\\s*>\\s*NX\\s+View logs",
  "^———————",
  "^—————————",
  "^\\s+Nx \\(powered by",
]
# RTK: truncate_lines_at = 150  (not yet supported by QTK — review)
truncate = 60
