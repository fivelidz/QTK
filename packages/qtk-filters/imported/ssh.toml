#
# RTK description: "Compact ssh output — strip connection banners, keep command output"

command = "ssh"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Warning: Permanently added",
  "^Connection to .+ closed",
  "^Authenticated to",
  "^debug1:",
  "^OpenSSH_",
  "^Pseudo-terminal",
]
truncate = 200
# RTK: truncate_lines_at = 120  (not yet supported by QTK — review)
