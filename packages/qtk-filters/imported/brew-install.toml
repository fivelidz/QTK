# RTK description: "Compact brew install/upgrade output — strip downloads, short-circuit when already installed"

command = "brew\\s+(install|upgrade)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^==> Downloading",
  "^==> Pouring",
  "^Already downloaded:",
  "^###",
  "^==> Fetching",
]
# RTK: match_output = [...]  (multi-line; not yet supported by QTK — review)
truncate = 20
