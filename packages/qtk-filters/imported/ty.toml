# RTK description: "Compact ty type checker output — strip blank lines, keep errors"

command = "ty"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Checking \\d+ file",
  "^ty \\d+\\.\\d+",
]
truncate = 50
on_empty = "ty: ok"
