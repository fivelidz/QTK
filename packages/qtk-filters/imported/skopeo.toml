#
# RTK description: "Compact skopeo output — truncate large manifests, strip verbosity"

command = "skopeo"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Getting image source signatures",
  "^Copying blob",
  "^Copying config",
  "^Writing manifest",
  "^Storing signatures",
]
truncate = 30
# RTK: truncate_lines_at = 120  (not yet supported by QTK — review)
on_empty = "skopeo: ok"
