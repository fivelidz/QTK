# RTK description: "Compact dotnet build output — short-circuit on success, strip banners"

command = "dotnet\\s+build"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Microsoft \\(R\\)",
  "^Copyright \\(C\\)",
  "^  Determining projects",
]
# RTK: match_output = [...]  (multi-line; not yet supported by QTK — review)
truncate = 40
