# RTK description: "Compact Jujutsu (jj) output — strip blank lines, truncate"

command = "jj"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Hint:",
  "^Working copy now at:",
]
truncate = 30
