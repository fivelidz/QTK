#
# RTK description: "Compact ping output — strip per-packet lines, keep summary"

command = "ping"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^PING ",
  "^Pinging ",
  "^\\d+ bytes from ",
  "^Reply from .+: bytes=",
  "^\\s*$",
]
tail_lines = 4
