# RTK description: "Compact bundle install/update — strip 'Using' lines, keep installs and errors"

command = "bundle\\s+(install|update)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^Using ",
  "^\\s*$",
  "^Fetching gem metadata",
  "^Resolving dependencies",
]
# RTK: match_output = [...]  (multi-line; not yet supported by QTK — review)
truncate = 30
