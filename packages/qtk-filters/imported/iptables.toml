# RTK description: "Compact iptables output"

command = "iptables"
strip = [
  "^\\s*$",
  "^Chain DOCKER",
  "^Chain BR-",
]
truncate = 50
# RTK: truncate_lines_at = 120  (not yet supported by QTK — review)
