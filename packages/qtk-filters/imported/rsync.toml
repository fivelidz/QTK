# RTK description: "Compact rsync output — short-circuit on success, strip progress"

command = "rsync"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^sending incremental file list",
  "^sent \\d",
]
# RTK: match_output = [...]  (multi-line; not yet supported by QTK — review)
truncate = 20
