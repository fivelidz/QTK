# RTK description: "Compact quarto render output"

command = "quarto\\s+render"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^\\s*processing file:",
  "^\\s*\\d+/\\d+\\s",
  "^\\s*running",
  "^\\s*Rendering",
  "^pandoc ",
  "^  Validating",
  "^  Resolving",
]
# RTK: match_output = [...]  (multi-line; not yet supported by QTK — review)
truncate = 20
