# RTK description: "Compact mise task runner output — strip status lines, keep task results"

command = "mise\\s+(run|exec|install|upgrade)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^mise\\s+(trust|install|upgrade).*✓",
  "^mise\\s+Installing\\s",
  "^mise\\s+Downloading\\s",
  "^mise\\s+Extracting\\s",
  "^mise\\s+\\w+@[\\d.]+ installed",
]
# RTK: truncate_lines_at = 150  (not yet supported by QTK — review)
truncate = 50
on_empty = "mise: ok"
