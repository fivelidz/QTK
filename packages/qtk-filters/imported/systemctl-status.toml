# RTK description: "Compact systemctl status output — strip blank lines, limit to 20 lines"

command = "systemctl\\s+status"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
]
truncate = 20
