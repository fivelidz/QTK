# RTK description: "Compact Maven build output"

command = "mvn\\s+(compile|package|clean|install)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\[INFO\\] ---",
  "^\\[INFO\\] Building\\s",
  "^\\[INFO\\] Downloading\\s",
  "^\\[INFO\\] Downloaded\\s",
  "^\\[INFO\\]\\s*$",
  "^\\s*$",
  "^Downloading:",
  "^Downloaded:",
  "^Progress",
]
truncate = 50
on_empty = "mvn: ok"
