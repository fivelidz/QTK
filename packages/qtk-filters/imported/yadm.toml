# RTK description: "Compact yadm (git wrapper) output — same filtering as git"

command = "yadm"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^\\s*\\(use \"git ",
  "^\\s*\\(use \"yadm ",
]
# RTK: truncate_lines_at = 120  (not yet supported by QTK — review)
truncate = 40
