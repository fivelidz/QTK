# RTK description: "Compact basedpyright type checker output — strip blank lines, keep errors"

command = "basedpyright"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Searching for source files",
  "^Found \\d+ source file",
  "^Pyright \\d+\\.\\d+",
  "^basedpyright \\d+\\.\\d+",
]
truncate = 50
on_empty = "basedpyright: ok"
