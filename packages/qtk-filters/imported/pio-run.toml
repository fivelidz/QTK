# RTK description: "Compact PlatformIO build output"

command = "pio\\s+run"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Verbose mode",
  "^CONFIGURATION:",
  "^LDF:",
  "^Library Manager:",
  "^Compiling\\s",
  "^Linking\\s",
  "^Building\\s",
  "^Checking size",
]
truncate = 30
on_empty = "pio run: ok"
