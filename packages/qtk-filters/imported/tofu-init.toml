# RTK description: "Compact OpenTofu init output"

command = "tofu\\s+init(\\s|$)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^- Downloading",
  "^- Installing",
  "^- Using previously-installed",
  "^\\s*$",
  "^Initializing provider",
  "^Initializing the backend",
  "^Initializing modules",
]
truncate = 20
on_empty = "tofu init: ok"
