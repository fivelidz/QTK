#
# RTK description: "Compact gcc/g++ compiler output — strip notes, keep errors and warnings"

command = "g(cc|\\+\\+)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^\\s+\\|\\s*$",
  "^In file included from",
  "^\\s+from\\s",
  "^\\d+ warnings? generated",
  "^\\d+ errors? generated",
]
truncate = 50
on_empty = "gcc: ok"
