# RTK description: "Compact pre-commit output"

command = "pre-commit"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\[INFO\\] Installing environment",
  "^\\[INFO\\] Once installed this environment will be reused",
  "^\\[INFO\\] This may take a few minutes",
  "^\\s*$",
]
truncate = 40
