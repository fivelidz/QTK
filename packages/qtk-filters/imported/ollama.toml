# RTK description: "Strip ANSI spinners and cursor control from ollama output, keep final text"

command = "ollama\\s+run"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^[⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏\\s]*$",
  "^\\s*$",
]
