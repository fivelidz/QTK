# RTK description: "Compact go-task output — strip task headers, keep command results"

command = "task"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^task: \\[.*\\] ",
  "^task: Task .* is up to date",
]
# RTK: truncate_lines_at = 150  (not yet supported by QTK — review)
truncate = 50
on_empty = "task: ok"
