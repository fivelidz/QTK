# RTK description: "Compact mix compile output"

command = "mix\\s+compile(\\s|$)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^Compiling \\d+ file",
  "^\\s*$",
  "^Generated\\s",
]
truncate = 40
on_empty = "mix compile: ok"
