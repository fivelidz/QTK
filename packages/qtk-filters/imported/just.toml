# RTK description: "Compact just task runner output — strip recipe headers, keep command output"

command = "just"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^\\s*Available recipes:",
  "^\\s*just --list",
]
# RTK: truncate_lines_at = 150  (not yet supported by QTK — review)
truncate = 50
