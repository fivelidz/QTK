# RTK description: "Compact shopify theme push/pull output"

command = "shopify\\s+theme\\s+(push|pull)"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^\\s*Uploading",
  "^\\s*Downloading",
]
tail_lines = 5
truncate = 15
on_empty = "shopify theme: ok"
