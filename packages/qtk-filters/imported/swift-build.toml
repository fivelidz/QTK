# RTK description: "Compact swift build output — short-circuit on success, strip Compiling/Linking"

command = "swift\\s+build"
# RTK: strip_ansi = true  (not yet supported by QTK — review)
strip = [
  "^\\s*$",
  "^Compiling ",
  "^Linking ",
]
# RTK: match_output = [...]  (multi-line; not yet supported by QTK — review)
truncate = 40
